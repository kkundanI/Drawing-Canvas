<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drawboard v3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0e0e10; --panel: #18181b; --panel2: #1f1f23;
  --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
  --text: #f0f0f0; --muted: #888; --accent: #c8f04a; --red: #f87171;
  --blue: #60a5fa; --panel-w: 228px; --radius: 10px;
}
/* ── MODAL ── */
#modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:500; display:none; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
#modal-overlay.open { display:flex; }
#modal { background:var(--panel); border:1px solid var(--border2); border-radius:16px; padding:28px; width:360px; max-width:90vw; box-shadow:0 24px 80px rgba(0,0,0,0.6); }
#modal h2 { font-size:15px; font-weight:700; color:var(--text); margin-bottom:18px; letter-spacing:-0.3px; }
.modal-presets { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-bottom:18px; }
.preset-btn { background:var(--panel2); border:1px solid var(--border); border-radius:8px; padding:8px 4px; cursor:pointer; font-family:'Syne',sans-serif; font-size:10px; color:var(--muted); transition:all 0.15s; display:flex; flex-direction:column; align-items:center; gap:3px; }
.preset-btn:hover { border-color:var(--border2); color:var(--text); }
.preset-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(200,240,74,0.06); }
.preset-btn .pname { font-weight:600; font-size:11px; }
.preset-btn .psize { font-size:9px; font-family:'DM Mono',monospace; opacity:0.7; }
.modal-dims { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
.dim-field { flex:1; display:flex; flex-direction:column; gap:5px; }
.dim-field label { font-size:10px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }
.dim-field input { background:var(--panel2); border:1px solid var(--border2); border-radius:8px; color:var(--text); font-family:'DM Mono',monospace; font-size:14px; padding:8px 10px; outline:none; width:100%; transition:border 0.15s; }
.dim-field input:focus { border-color:var(--accent); }
.lock-btn { width:28px; height:28px; background:var(--panel2); border:1px solid var(--border2); border-radius:6px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--muted); flex-shrink:0; margin-top:18px; transition:all 0.15s; }
.lock-btn.locked { border-color:var(--accent); color:var(--accent); background:rgba(200,240,74,0.08); }
.modal-anchor { margin-bottom:18px; }
.modal-anchor label { font-size:10px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; display:block; margin-bottom:8px; }
.anchor-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:4px; width:96px; }
.anchor-dot { width:28px; height:28px; background:var(--panel2); border:1px solid var(--border); border-radius:5px; cursor:pointer; transition:all 0.12s; }
.anchor-dot:hover { border-color:var(--border2); }
.anchor-dot.active { background:var(--accent); border-color:var(--accent); }
.modal-actions { display:flex; gap:8px; justify-content:flex-end; }
.modal-actions button { font-family:'Syne',sans-serif; font-size:12px; padding:9px 18px; border-radius:8px; cursor:pointer; border:1px solid var(--border2); transition:all 0.15s; }
.modal-cancel { background:var(--panel2); color:var(--muted); }
.modal-cancel:hover { color:var(--text); }
.modal-apply { background:rgba(200,240,74,0.12); border-color:var(--accent); color:var(--accent); font-weight:600; }
.modal-apply:hover { background:rgba(200,240,74,0.22); }
body { background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; display:flex; height:100vh; overflow:hidden; user-select:none; }
#sidebar { width:var(--panel-w); background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow-y:auto; overflow-x:hidden; flex-shrink:0; z-index:10; }
#sidebar::-webkit-scrollbar { display:none; }
.logo { padding:16px 18px 14px; font-size:17px; font-weight:700; letter-spacing:-0.5px; border-bottom:1px solid var(--border); color:var(--accent); }
.logo span { color:var(--text); opacity:0.5; font-weight:400; font-size:13px; display:block; margin-top:1px; }
.section-label { padding:14px 18px 6px; font-size:10px; font-weight:500; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); }
.tool-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; padding:0 12px 12px; }
.tool-btn { background:var(--panel2); border:1px solid var(--border); border-radius:var(--radius); padding:10px 6px 8px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:5px; transition:all 0.15s; color:var(--muted); font-size:10px; font-family:'Syne',sans-serif; letter-spacing:0.5px; }
.tool-btn svg { width:26px; height:26px; }
.tool-btn:hover { border-color:var(--border2); color:var(--text); }
.tool-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(200,240,74,0.06); }
.slider-row { padding:0 18px 12px; display:flex; flex-direction:column; gap:6px; }
.slider-label { display:flex; justify-content:space-between; font-size:11px; color:var(--muted); }
.slider-label strong { color:var(--text); font-weight:500; }
input[type=range] { -webkit-appearance:none; width:100%; height:4px; border-radius:2px; background:var(--panel2); outline:none; border:1px solid var(--border); }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:var(--accent); cursor:pointer; border:none; }
.color-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:5px; padding:0 12px 12px; }
.color-swatch { aspect-ratio:1; border-radius:6px; cursor:pointer; border:2px solid transparent; transition:all 0.1s; }
.color-swatch:hover { transform:scale(1.1); }
.color-swatch.active { border-color:white; transform:scale(1.1); }
.custom-color-row { padding:0 12px 14px; display:flex; align-items:center; gap:8px; }
.custom-color-row label { font-size:11px; color:var(--muted); flex:1; }
input[type=color] { width:36px; height:28px; border:1px solid var(--border2); border-radius:6px; background:transparent; cursor:pointer; padding:2px; }
.toggle-row { padding:0 12px 10px; display:flex; align-items:center; justify-content:space-between; gap:8px; }
.toggle-label { font-size:11px; color:var(--muted); }
.toggle { position:relative; width:34px; height:18px; background:var(--panel2); border:1px solid var(--border2); border-radius:9px; cursor:pointer; transition:background 0.2s; flex-shrink:0; }
.toggle.on { background:var(--accent); border-color:var(--accent); }
.toggle::after { content:''; position:absolute; top:2px; left:2px; width:12px; height:12px; background:var(--text); border-radius:50%; transition:left 0.2s; }
.toggle.on::after { left:18px; background:var(--bg); }
.sep { height:1px; background:var(--border); margin:4px 0; }
.action-btn { display:flex; align-items:center; gap:8px; width:calc(100% - 24px); margin:0 12px 6px; padding:9px 12px; background:var(--panel2); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-size:12px; font-family:'Syne',sans-serif; cursor:pointer; transition:all 0.15s; text-align:left; }
.action-btn:hover { border-color:var(--border2); background:#27272b; }
.action-btn.danger:hover { border-color:var(--red); color:var(--red); }
.action-btn svg { flex-shrink:0; opacity:0.7; }
.action-btn.accent { border-color:var(--accent); color:var(--accent); background:rgba(200,240,74,0.06); }
.action-btn.accent:hover { background:rgba(200,240,74,0.12); }
.action-btn:disabled { opacity:0.3; cursor:not-allowed; pointer-events:none; }
.btn-row { display:flex; gap:6px; padding:0 12px 6px; }
.btn-row .action-btn { width:auto; flex:1; margin:0; justify-content:center; padding:9px 4px; font-size:11px; }
/* fill toggle row */
.fill-row { padding:0 12px 10px; display:flex; align-items:center; gap:8px; }
.fill-label { font-size:11px; color:var(--muted); flex:1; }
.fill-btn { padding:4px 10px; font-size:10px; font-family:'Syne',sans-serif; border-radius:6px; cursor:pointer; border:1px solid var(--border2); background:var(--panel2); color:var(--muted); transition:all 0.15s; }
.fill-btn.active { background:rgba(200,240,74,0.1); border-color:var(--accent); color:var(--accent); }
/* main */
#main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
#topbar { height:44px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 16px; gap:10px; flex-shrink:0; }
.status-pill { background:var(--panel2); border:1px solid var(--border); border-radius:20px; padding:3px 10px; font-size:11px; color:var(--muted); font-family:'DM Mono',monospace; white-space:nowrap; }
.status-pill span { color:var(--accent); }
.topbar-right { margin-left:auto; display:flex; gap:8px; }
.tool-pill { padding:5px 13px; background:transparent; border:1px solid var(--border2); border-radius:20px; color:var(--muted); font-size:11px; font-family:'Syne',sans-serif; cursor:pointer; transition:all 0.15s; display:flex; align-items:center; gap:5px; }
.tool-pill:hover { color:var(--text); border-color:rgba(255,255,255,0.3); }
.tool-pill.active { border-color:var(--blue); color:var(--blue); background:rgba(96,165,250,0.08); }
.tool-pill.eraser-on { border-color:var(--red); color:var(--red); background:rgba(248,113,113,0.08); }
#canvas-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:24px; background:repeating-conic-gradient(#1a1a1e 0% 25%, #161618 0% 50%) 0 0 / 20px 20px; position:relative; overflow:hidden; }
#canvas-container { position:relative; border-radius:4px; box-shadow:0 0 0 1px rgba(255,255,255,0.1), 0 20px 60px rgba(0,0,0,0.5); flex-shrink:0; overflow:hidden; }
#bg-canvas { display:block; }
#drawing-canvas { display:block; position:absolute; top:0; left:0; }
#overlay-canvas { display:block; position:absolute; top:0; left:0; pointer-events:none; }
/* selection overlay */
#sel-box { position:absolute; pointer-events:none; border:1.5px dashed var(--blue); display:none; box-shadow:0 0 0 1px rgba(0,0,0,0.3); }
.sel-handle { position:absolute; width:9px; height:9px; background:white; border:1.5px solid var(--blue); border-radius:2px; transform:translate(-50%,-50%); pointer-events:all; cursor:pointer; }
/* crop overlay */
#crop-overlay { position:absolute; top:0; left:0; pointer-events:none; display:none; }
#snap-indicator { position:fixed; pointer-events:none; width:22px; height:22px; border-radius:50%; border:2px solid var(--accent); background:rgba(200,240,74,0.15); transform:translate(-50%,-50%); display:none; }
#cursor-dot { position:fixed; pointer-events:none; border-radius:50%; background:rgba(200,240,74,0.15); border:1.5px solid rgba(200,240,74,0.7); transform:translate(-50%,-50%); display:none; z-index:9999; transition:width 0.1s,height 0.1s; }
#cursor-dot.on-eraser { background:rgba(248,113,113,0.15); border-color:rgba(248,113,113,0.7); }
#cursor-dot.on-select { background:rgba(96,165,250,0.1); border-color:rgba(96,165,250,0.5); border-radius:2px; border-style:dashed; }
#ghost-dot { position:fixed; pointer-events:none; border-radius:50%; border:1px dashed rgba(200,240,74,0.45); transform:translate(-50%,-50%); display:none; z-index:9998; transition:width 0.1s,height 0.1s; }
#toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(60px); background:var(--panel); border:1px solid var(--border2); border-radius:20px; padding:8px 18px; font-size:12px; color:var(--text); transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index:10000; white-space:nowrap; }
#toast.show { transform:translateX(-50%) translateY(0); }
/* crop controls */
#crop-controls { position:fixed; bottom:70px; left:50%; transform:translateX(-50%); display:none; gap:8px; background:var(--panel); border:1px solid var(--border2); border-radius:20px; padding:8px 16px; z-index:200; }
#crop-controls button { background:none; border:none; color:var(--text); font-family:'Syne',sans-serif; font-size:12px; cursor:pointer; padding:4px 10px; border-radius:10px; transition:background 0.15s; }
#crop-controls button:hover { background:var(--panel2); }
#crop-controls .apply-crop { color:var(--accent); font-weight:600; }
#crop-controls .cancel-crop { color:var(--muted); }
</style>
</head>
<body>

<div id="sidebar">
  <div class="logo">drawboard<span>/ v3</span></div>

  <div class="section-label">Draw Tools</div>
  <div class="tool-grid">
    <button class="tool-btn active" data-tool="pen">
      <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M6 22l2-6 12-12 4 4-12 12z"/><path d="M6 22l4-2"/></svg>Pen
    </button>
    <button class="tool-btn" data-tool="marker">
      <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="10" y="3" width="8" height="14" rx="4"/><path d="M14 17v8"/><path d="M11 22h6"/></svg>Marker
    </button>
    <button class="tool-btn" data-tool="brush">
      <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M6 6l14 14"/><path d="M8 20c0 2 3 3 4 1 1-3-2-6-4-4z"/></svg>Brush
    </button>
    <button class="tool-btn" data-tool="pencil">
      <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M8 20l2-5 9-9 3 3-9 9z"/><path d="M8 20l3-1"/><path d="M19 6l1 1"/></svg>Pencil
    </button>
    <button class="tool-btn" data-tool="chalk">
      <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="11" y="4" width="6" height="18" rx="3" transform="rotate(15 14 13)"/><path d="M9 22 Q14 20 18 23" stroke-dasharray="2 2"/></svg>Chalk
    </button>
    <button class="tool-btn" data-tool="spray">
      <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="20" r="4"/><path d="M12 20h8M20 20v-4M16 12l4 4"/><circle cx="18" cy="10" r="1" fill="currentColor" stroke="none"/><circle cx="22" cy="8" r="1" fill="currentColor" stroke="none"/></svg>Spray
    </button>
  </div>

  <div class="section-label">Shapes</div>
  <div class="tool-grid">
    <button class="tool-btn" data-tool="rect">
      <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="4" y="7" width="20" height="14" rx="2"/></svg>Rect
    </button>
    <button class="tool-btn" data-tool="circle">
      <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="14" cy="14" r="9"/></svg>Ellipse
    </button>
    <button class="tool-btn" data-tool="triangle">
      <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 5l10 18H4z"/></svg>Triangle
    </button>
    <button class="tool-btn" data-tool="line">
      <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M5 23L23 5"/></svg>Line
    </button>
    <button class="tool-btn" data-tool="arrow">
      <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 23L21 7"/><path d="M21 7l-8 1 7 7z" fill="currentColor" stroke="none"/></svg>Arrow
    </button>
    <button class="tool-btn" data-tool="star">
      <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4l2.5 7h7l-5.5 4 2 7L14 18l-6 4 2-7L4.5 11h7z"/></svg>Star
    </button>
    <button class="tool-btn" data-tool="diamond">
      <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4l10 10-10 10L4 14z"/></svg>Diamond
    </button>
    <button class="tool-btn" data-tool="hexagon">
      <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4l9 5v10l-9 5-9-5V9z"/></svg>Hex
    </button>
  </div>

  <div class="fill-row">
    <span class="fill-label">Shape fill</span>
    <button class="fill-btn active" id="fill-none-btn">None</button>
    <button class="fill-btn" id="fill-solid-btn">Solid</button>
  </div>

  <div class="section-label">Size</div>
  <div class="slider-row">
    <div class="slider-label"><span>Stroke</span><strong id="size-val">6</strong></div>
    <input type="range" id="size-slider" min="1" max="60" value="6">
  </div>
  <div class="slider-row">
    <div class="slider-label"><span>Opacity</span><strong id="opacity-val">100%</strong></div>
    <input type="range" id="opacity-slider" min="5" max="100" value="100">
  </div>

  <div class="sep"></div>
  <div class="section-label">Color</div>
  <div class="color-grid" id="color-grid"></div>
  <div class="custom-color-row">
    <label>Custom</label>
    <input type="color" id="custom-color" value="#1a1a1a">
  </div>

  <div class="sep"></div>
  <div class="section-label">Options</div>
  <div class="toggle-row">
    <span class="toggle-label">Smooth Lines</span>
    <div class="toggle on" id="smooth-toggle"></div>
  </div>
  <div class="toggle-row">
    <span class="toggle-label">Pressure Sim</span>
    <div class="toggle on" id="pressure-toggle"></div>
  </div>
  <div class="toggle-row">
    <span class="toggle-label">Stabilizer</span>
    <div class="toggle" id="stabilizer-toggle"></div>
  </div>
  <div class="slider-row" id="stabilizer-row" style="display:none">
    <div class="slider-label"><span>Smoothness</span><strong id="stabilizer-val">0.85</strong></div>
    <input type="range" id="stabilizer-slider" min="1" max="99" value="85">
  </div>

  <div class="sep"></div>
  <div class="section-label">History</div>
  <div class="btn-row">
    <button class="action-btn" id="undo-btn">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M2 7 Q2 2 7 2 Q12 2 12 7 Q12 12 7 12"/><path d="M2 7L4 5M2 7L4 9"/></svg>Undo
    </button>
    <button class="action-btn" id="redo-btn">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 7 Q12 2 7 2 Q2 2 2 7 Q2 12 7 12"/><path d="M12 7L10 5M12 7L10 9"/></svg>Redo
    </button>
  </div>

  <div class="sep"></div>
  <div class="section-label">Actions</div>
  <button class="action-btn" id="resize-canvas-btn">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="10" height="10" rx="1"/><path d="M12 8v4h-4M12 12l-4-4"/></svg>
    Resize Canvas
  </button>
  <button class="action-btn" id="select-btn">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 3l5 12 2-5 5-2z"/></svg>Select / Move
  </button>
  <button class="action-btn" id="crop-btn">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 5h8v8"/><path d="M5 3v8h8"/></svg>Crop Canvas
  </button>
  <button class="action-btn accent" id="download-btn">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M7 2v8M4 7l3 3 3-3"/><path d="M2 11v1a1 1 0 001 1h8a1 1 0 001-1v-1"/></svg>Export PNG
  </button>
  <button class="action-btn danger" id="clear-btn">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M2 4h10M5 4V3h4v1M11 4l-1 9H4L3 4"/></svg>Clear Canvas
  </button>
</div>

<div id="main">
  <div id="topbar">
    <div class="status-pill">tool: <span id="status-tool">pen</span></div>
    <div class="status-pill">size: <span id="status-size">6</span>px</div>
    <div class="status-pill"><span id="canvas-w">0</span>×<span id="canvas-h">0</span></div>
    <div class="status-pill">x:<span id="sx">0</span> y:<span id="sy">0</span></div>
    <div class="topbar-right">
      <button class="tool-pill" id="eraser-btn">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M10 3L5 8l-2 4 4-2 5-5z"/><path d="M8 5l2 2"/><path d="M3 12h8"/></svg>
        Eraser [E]
      </button>
    </div>
  </div>
  <div id="canvas-wrap">
    <div id="canvas-container">
      <canvas id="bg-canvas"></canvas>
      <canvas id="drawing-canvas"></canvas>
      <canvas id="overlay-canvas"></canvas>
      <div id="sel-box"></div>
      <canvas id="crop-overlay"></canvas>
    </div>
    <div id="snap-indicator"></div>
    <div id="cursor-dot"></div>
    <div id="ghost-dot"></div>
  </div>
</div>

<div id="crop-controls">
  <button class="cancel-crop" id="cancel-crop-btn">Cancel</button>
  <button class="apply-crop" id="apply-crop-btn">✓ Apply Crop</button>
</div>

<!-- ── RESIZE CANVAS MODAL ── -->
<div id="modal-overlay">
  <div id="modal">
    <h2>Resize Canvas</h2>
    <div class="modal-presets" id="modal-presets"></div>
    <div class="modal-dims">
      <div class="dim-field">
        <label>Width</label>
        <input type="number" id="modal-w" min="10" max="8000" value="800">
      </div>
      <button class="lock-btn locked" id="lock-ratio-btn" title="Lock aspect ratio">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="6" width="7" height="6" rx="1"/><path d="M5 6V4a2 2 0 014 0v2"/></svg>
      </button>
      <div class="dim-field">
        <label>Height</label>
        <input type="number" id="modal-h" min="10" max="8000" value="600">
      </div>
    </div>
    <div class="modal-anchor">
      <label>Anchor / Expand direction</label>
      <div class="anchor-grid" id="anchor-grid"></div>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" id="modal-cancel-btn">Cancel</button>
      <button class="modal-apply" id="modal-apply-btn">Apply Resize</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════
//  DRAWBOARD v2 — shapes, select, resize, crop, working export
// ═══════════════════════════════════════════════

const bgCanvas   = document.getElementById('bg-canvas');
const bgCtx      = bgCanvas.getContext('2d');
const canvas     = document.getElementById('drawing-canvas');
const ctx        = canvas.getContext('2d');
const overlayCanvas = document.getElementById('overlay-canvas');
const octx       = overlayCanvas.getContext('2d');
const cropCanvas = document.getElementById('crop-overlay');
const cropCtx    = cropCanvas.getContext('2d');
const wrap       = document.getElementById('canvas-wrap');
const container  = document.getElementById('canvas-container');

// ── RESIZE (internal) ──
// preserveContent=true: keep existing drawing scaled/positioned
// preserveContent=false: just resize infrastructure (used by undo restore)
function _resizeAllCanvases(w, h, preserveContent) {
  const saved = (preserveContent && canvas.width > 0)
    ? ctx.getImageData(0, 0, canvas.width, canvas.height)
    : null;
  const oldW = canvas.width, oldH = canvas.height;

  bgCanvas.width=w; bgCanvas.height=h;
  canvas.width=w; canvas.height=h;
  overlayCanvas.width=w; overlayCanvas.height=h;
  cropCanvas.width=w; cropCanvas.height=h;
  container.style.width=w+'px'; container.style.height=h+'px';

  bgCtx.fillStyle='#ffffff'; bgCtx.fillRect(0,0,w,h);

  if (saved) ctx.putImageData(saved, 0, 0); // top-left anchor by default
  updateCanvasSizePill();
}

function updateCanvasSizePill() {
  const wEl = document.getElementById('canvas-w');
  const hEl = document.getElementById('canvas-h');
  if (wEl) wEl.textContent = canvas.width;
  if (hEl) hEl.textContent = canvas.height;
}

// initial auto-fit resize (no undo entry needed)
function resizeCanvas() {
  const wr = wrap.getBoundingClientRect();
  const pw = wr.width-48, ph = wr.height-48;
  const aspect = 4/3;
  let w=pw, h=pw/aspect;
  if (h>ph) { h=ph; w=ph*aspect; }
  w=Math.floor(w); h=Math.floor(h);
  _resizeAllCanvases(w, h, true);
}
window.addEventListener('resize', resizeCanvas);

// ── STATE ──
const DRAW_TOOLS = ['pen','marker','brush','pencil','chalk','spray'];
const SHAPE_TOOLS = ['rect','circle','triangle','line','arrow','star','diamond','hexagon'];

const S = {
  tool: 'pen', size:6, opacity:1, color:'#1a1a1a',
  smooth:true, pressure:true, eraser:false,
  stabilizer:false, smoothness:0.85,
  shapeFill: false,
  drawing:false, points:[], startX:0, startY:0,
  // selection
  selecting:false, sel:null, // {x,y,w,h}
  selImg:null, selDragging:false, selResizing:false, selHandle:null,
  selDragOff:{x:0,y:0},
  // crop
  cropping:false, cropRect:null, cropDragging:false, cropHandle:null,
};

let undoStack=[], redoStack=[];

// Each undo entry stores {imgData, width, height} so canvas size can be restored
function captureState() {
  return {
    imgData: ctx.getImageData(0, 0, canvas.width, canvas.height),
    width: canvas.width,
    height: canvas.height
  };
}
function applyState(state) {
  // resize all canvases to match stored dimensions
  if (canvas.width !== state.width || canvas.height !== state.height) {
    _resizeAllCanvases(state.width, state.height, false);
  }
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.putImageData(state.imgData, 0, 0);
  updateCanvasSizePill();
}

const capture  = ()    => ctx.getImageData(0, 0, canvas.width, canvas.height);
const applyImg = (img) => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.putImageData(img,0,0); };

function pushUndo() {
  undoStack.push(captureState());
  if(undoStack.length>60) undoStack.shift();
  redoStack=[];
  refreshBtns();
}
function refreshBtns() {
  document.getElementById('undo-btn').disabled = !undoStack.length;
  document.getElementById('redo-btn').disabled = !redoStack.length;
}
let liveSnap=null;

// ── COLORS ──
const PALETTE = ['#1a1a1a','#ffffff','#e63946','#f4a261','#e9c46a','#2a9d8f','#457b9d','#6d6875','#f72585','#4cc9f0','#80b918','#ff6b6b','#ffd166','#06d6a0','#118ab2','#a8dadc','#8338ec','#3a86ff','#fb5607','#ffbe0b'];
const cgrid = document.getElementById('color-grid');
PALETTE.forEach(c=>{
  const s=document.createElement('div');
  s.className='color-swatch'+(c==='#1a1a1a'?' active':'');
  s.style.background=c;
  if(c==='#ffffff') s.style.border='2px solid rgba(255,255,255,0.25)';
  s.addEventListener('click',()=>{
    document.querySelectorAll('.color-swatch').forEach(x=>x.classList.remove('active'));
    s.classList.add('active'); S.color=c;
    document.getElementById('custom-color').value=c;
    setEraser(false);
  });
  cgrid.appendChild(s);
});
document.getElementById('custom-color').addEventListener('input',e=>{
  document.querySelectorAll('.color-swatch').forEach(x=>x.classList.remove('active'));
  S.color=e.target.value; setEraser(false);
});

// ── TOOL BUTTONS ──
function setTool(t) {
  S.tool=t; S.eraser=false;
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.toggle('active',b.dataset.tool===t));
  document.getElementById('status-tool').textContent=t;
  document.getElementById('eraser-btn').classList.remove('eraser-on');
  document.getElementById('select-btn').classList.toggle('active', t==='select');
  canvas.style.cursor = t==='select'||t==='crop' ? 'default' : 'crosshair';
  if (t!=='select') clearSelection();
  if (t!=='crop') endCrop(false);
  updateDot();
}
document.querySelectorAll('.tool-btn').forEach(btn=>{
  btn.addEventListener('click',()=>setTool(btn.dataset.tool));
});

// ── SLIDERS ──
document.getElementById('size-slider').addEventListener('input',function(){
  S.size=+this.value;
  document.getElementById('size-val').textContent=S.size;
  document.getElementById('status-size').textContent=S.size;
  updateDot();
});
document.getElementById('opacity-slider').addEventListener('input',function(){
  S.opacity=+this.value/100;
  document.getElementById('opacity-val').textContent=this.value+'%';
});

// ── TOGGLES ──
function makeToggle(id,key){ document.getElementById(id).addEventListener('click',function(){ S[key]=!S[key]; this.classList.toggle('on',S[key]); toast(key+': '+(S[key]?'on':'off')); }); }
makeToggle('smooth-toggle','smooth');
makeToggle('pressure-toggle','pressure');

// ── FILL ──
document.getElementById('fill-none-btn').addEventListener('click',()=>{ S.shapeFill=false; document.getElementById('fill-none-btn').classList.add('active'); document.getElementById('fill-solid-btn').classList.remove('active'); });
document.getElementById('fill-solid-btn').addEventListener('click',()=>{ S.shapeFill=true; document.getElementById('fill-solid-btn').classList.add('active'); document.getElementById('fill-none-btn').classList.remove('active'); });

// ── STABILIZER ──
const stabRow=document.getElementById('stabilizer-row');
document.getElementById('stabilizer-toggle').addEventListener('click',function(){
  S.stabilizer=!S.stabilizer; this.classList.toggle('on',S.stabilizer);
  stabRow.style.display=S.stabilizer?'flex':'none';
  if(!S.stabilizer) ghostDot.style.display='none';
  toast('Stabilizer: '+(S.stabilizer?'on':'off'));
});
document.getElementById('stabilizer-slider').addEventListener('input',function(){
  S.smoothness=Math.round(this.value)/100;
  document.getElementById('stabilizer-val').textContent=S.smoothness.toFixed(2);
});

// ── ERASER ──
function setEraser(on){ S.eraser=on; document.getElementById('eraser-btn').classList.toggle('eraser-on',on); if(on) { S.tool='eraser'; document.getElementById('status-tool').textContent='eraser'; } updateDot(); }
document.getElementById('eraser-btn').addEventListener('click',()=>{ setEraser(!S.eraser); toast(S.eraser?'Eraser on':'Eraser off'); });

// ── UNDO/REDO ──
function undo(){ if(!undoStack.length) return; redoStack.push(captureState()); applyState(undoStack.pop()); clearSelection(); refreshBtns(); }
function redo(){ if(!redoStack.length) return; undoStack.push(captureState()); applyState(redoStack.pop()); clearSelection(); refreshBtns(); }
document.getElementById('undo-btn').addEventListener('click',undo);
document.getElementById('redo-btn').addEventListener('click',redo);

// ── CLEAR ──
document.getElementById('clear-btn').addEventListener('click',()=>{ pushUndo(); ctx.clearRect(0,0,canvas.width,canvas.height); clearSelection(); toast('Canvas cleared'); });

// ════════════════════════════════
//  RESIZE CANVAS MODAL
// ════════════════════════════════
const PRESETS = [
  { name:'Square',    w:800,  h:800  },
  { name:'4:3',       w:800,  h:600  },
  { name:'16:9 HD',   w:1280, h:720  },
  { name:'A4',        w:794,  h:1123 },
  { name:'Instagram', w:1080, h:1080 },
  { name:'Twitter',   w:1500, h:500  },
  { name:'Story',     w:1080, h:1920 },
  { name:'Letter',    w:850,  h:1100 },
  { name:'Banner',    w:1200, h:400  },
];

// anchor: 0=top-left 1=top-center 2=top-right
//         3=mid-left  4=center    5=mid-right
//         6=bot-left  7=bot-center 8=bot-right
let modalAnchor = 0;
let ratioLocked = true;
let activePreset = null;

const modalOverlay = document.getElementById('modal-overlay');
const modalW = document.getElementById('modal-w');
const modalH = document.getElementById('modal-h');
const lockBtn = document.getElementById('lock-ratio-btn');
const anchorGrid = document.getElementById('anchor-grid');
const presetsContainer = document.getElementById('modal-presets');

// Build preset buttons
PRESETS.forEach((p,i) => {
  const btn = document.createElement('button');
  btn.className = 'preset-btn';
  btn.innerHTML = `<span class="pname">${p.name}</span><span class="psize">${p.w}×${p.h}</span>`;
  btn.addEventListener('click', () => {
    activePreset = i;
    document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    modalW.value = p.w; modalH.value = p.h;
  });
  presetsContainer.appendChild(btn);
});

// Build 3×3 anchor grid
for (let i=0;i<9;i++) {
  const d = document.createElement('div');
  d.className = 'anchor-dot' + (i===0?' active':'');
  d.addEventListener('click', () => {
    modalAnchor = i;
    document.querySelectorAll('.anchor-dot').forEach(x=>x.classList.remove('active'));
    d.classList.add('active');
  });
  anchorGrid.appendChild(d);
}

lockBtn.addEventListener('click', () => {
  ratioLocked = !ratioLocked;
  lockBtn.classList.toggle('locked', ratioLocked);
  lockBtn.innerHTML = ratioLocked
    ? `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="6" width="7" height="6" rx="1"/><path d="M5 6V4a2 2 0 014 0v2"/></svg>`
    : `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="6" width="7" height="6" rx="1"/><path d="M5 6V4q0-2 2-2M9 4V3"/></svg>`;
});

modalW.addEventListener('input', () => {
  if (!ratioLocked) return;
  const ratio = canvas.height / canvas.width;
  modalH.value = Math.round(+modalW.value * ratio);
  activePreset = null;
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
});
modalH.addEventListener('input', () => {
  if (!ratioLocked) return;
  const ratio = canvas.width / canvas.height;
  modalW.value = Math.round(+modalH.value * ratio);
  activePreset = null;
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
});

function openResizeModal() {
  modalW.value = canvas.width;
  modalH.value = canvas.height;
  activePreset = null;
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
  modalOverlay.classList.add('open');
}
function closeResizeModal() {
  modalOverlay.classList.remove('open');
}

document.getElementById('resize-canvas-btn').addEventListener('click', openResizeModal);
document.getElementById('modal-cancel-btn').addEventListener('click', closeResizeModal);
modalOverlay.addEventListener('click', e => { if(e.target===modalOverlay) closeResizeModal(); });

document.getElementById('modal-apply-btn').addEventListener('click', () => {
  const newW = Math.max(10, Math.min(8000, parseInt(modalW.value)||canvas.width));
  const newH = Math.max(10, Math.min(8000, parseInt(modalH.value)||canvas.height));
  applyCanvasResize(newW, newH, modalAnchor);
  closeResizeModal();
});

function applyCanvasResize(newW, newH, anchor) {
  // Save full state (dimensions + pixels) for undo
  pushUndo();

  const oldW = canvas.width, oldH = canvas.height;
  const oldImg = ctx.getImageData(0, 0, oldW, oldH);

  // Compute offset based on anchor
  // anchor rows: 0=top, 1=mid, 2=bot  cols: 0=left, 1=center, 2=right
  const row = Math.floor(anchor / 3);
  const col = anchor % 3;
  const offsetX = col === 0 ? 0 : col === 1 ? Math.round((newW - oldW) / 2) : newW - oldW;
  const offsetY = row === 0 ? 0 : row === 1 ? Math.round((newH - oldH) / 2) : newH - oldH;

  // Resize infrastructure (no preserve — we'll manually place the old img)
  _resizeAllCanvases(newW, newH, false);

  // Re-draw old content at computed offset
  ctx.putImageData(oldImg, offsetX, offsetY);

  clearSelection();
  toast(`Canvas resized to ${newW}×${newH}px`);
}

// ── EXPORT (FIXED) ──
document.getElementById('download-btn').addEventListener('click',()=>{
  flattenSelection(); // commit any floating selection first
  const out=document.createElement('canvas');
  out.width=canvas.width; out.height=canvas.height;
  const oc=out.getContext('2d');
  oc.fillStyle='#ffffff'; oc.fillRect(0,0,out.width,out.height);
  oc.drawImage(bgCanvas,0,0);
  oc.drawImage(canvas,0,0);
  const dataURL=out.toDataURL('image/png');
  const link=document.createElement('a');
  link.download='drawboard-'+Date.now()+'.png';
  link.href=dataURL;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  toast('PNG downloaded ↓');
});

// ── CURSOR DOT ──
const cursorDot=document.getElementById('cursor-dot');
const ghostDot=document.getElementById('ghost-dot');
function updateDot(){
  const s=S.eraser?S.size*2.5:S.size;
  cursorDot.style.width=s+'px'; cursorDot.style.height=s+'px';
  cursorDot.classList.toggle('on-eraser',S.eraser);
  cursorDot.classList.toggle('on-select',S.tool==='select');
}
updateDot();

// ── UTILS ──
function getPos(e){
  const r=canvas.getBoundingClientRect();
  const src=e.touches?e.touches[0]:e;
  return {x:src.clientX-r.left, y:src.clientY-r.top};
}
const dist=(a,b)=>Math.hypot(b.x-a.x,b.y-a.y);
const toRgba=(hex,a)=>{ const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgba(${r},${g},${b},${a})`; };

// ════════════════════════════════
//  SHAPE RENDERING
// ════════════════════════════════
function drawShape(cx,cy,x2,y2,toCtx){
  const c=toCtx||ctx;
  const lw=S.size*(S.pressure?0.8:1);
  c.strokeStyle=toRgba(S.color,S.opacity);
  c.fillStyle=toRgba(S.color,S.opacity*0.25);
  c.lineWidth=lw; c.lineCap='round'; c.lineJoin='round';
  c.globalCompositeOperation='source-over';
  c.beginPath();
  const dx=x2-cx, dy=y2-cy;
  switch(S.tool){
    case 'rect':
      c.rect(cx,cy,dx,dy);
      break;
    case 'circle':
      c.ellipse(cx+dx/2,cy+dy/2,Math.abs(dx)/2,Math.abs(dy)/2,0,0,Math.PI*2);
      break;
    case 'triangle':
      c.moveTo(cx+dx/2,cy);
      c.lineTo(cx+dx,cy+dy);
      c.lineTo(cx,cy+dy);
      c.closePath();
      break;
    case 'line':
      c.moveTo(cx,cy); c.lineTo(x2,y2);
      break;
    case 'arrow':{
      const angle=Math.atan2(dy,dx);
      const hw=Math.max(S.size*2,12);
      c.moveTo(cx,cy); c.lineTo(x2,y2);
      c.lineTo(x2-hw*Math.cos(angle-Math.PI/7),y2-hw*Math.sin(angle-Math.PI/7));
      c.moveTo(x2,y2);
      c.lineTo(x2-hw*Math.cos(angle+Math.PI/7),y2-hw*Math.sin(angle+Math.PI/7));
      break;
    }
    case 'star':{
      const cx2=cx+dx/2,cy2=cy+dy/2;
      const outerR=Math.min(Math.abs(dx),Math.abs(dy))/2;
      const innerR=outerR*0.4;
      for(let i=0;i<10;i++){
        const a=i*Math.PI/5-Math.PI/2;
        const r=i%2===0?outerR:innerR;
        i===0?c.moveTo(cx2+r*Math.cos(a),cy2+r*Math.sin(a)):c.lineTo(cx2+r*Math.cos(a),cy2+r*Math.sin(a));
      }
      c.closePath();
      break;
    }
    case 'diamond':{
      const cx2=cx+dx/2,cy2=cy+dy/2;
      c.moveTo(cx2,cy); c.lineTo(cx+dx,cy2); c.lineTo(cx2,cy+dy); c.lineTo(cx,cy2); c.closePath();
      break;
    }
    case 'hexagon':{
      const cx2=cx+dx/2,cy2=cy+dy/2;
      const rx=Math.abs(dx)/2,ry=Math.abs(dy)/2;
      for(let i=0;i<6;i++){
        const a=i*Math.PI/3-Math.PI/6;
        i===0?c.moveTo(cx2+rx*Math.cos(a),cy2+ry*Math.sin(a)):c.lineTo(cx2+rx*Math.cos(a),cy2+ry*Math.sin(a));
      }
      c.closePath();
      break;
    }
  }
  if(S.shapeFill && S.tool!=='line' && S.tool!=='arrow') c.fill();
  c.stroke();
}

// ════════════════════════════════
//  BRUSH STROKES
// ════════════════════════════════
function smooth(pts){
  if(pts.length<3) return pts;
  const out=[];
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[Math.max(i-1,0)],p1=pts[i],p2=pts[i+1],p3=pts[Math.min(i+2,pts.length-1)];
    for(let t=0;t<=1;t+=0.2){
      const t2=t*t,t3=t2*t;
      out.push({
        x:0.5*((2*p1.x)+(-p0.x+p2.x)*t+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
        y:0.5*((2*p1.y)+(-p0.y+p2.y)*t+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t2+(-p0.y+3*p1.y-3*p2.y+p3.y)*t3),
        pressure:p1.pressure
      });
    }
  }
  out.push(pts[pts.length-1]);
  return out;
}
function applyStyle(pressure){
  const base=S.size;
  const lw=S.pressure?base*(0.4+pressure*0.6):base;
  if(S.eraser){ ctx.globalCompositeOperation='destination-out'; ctx.strokeStyle='rgba(0,0,0,1)'; ctx.lineWidth=lw*2.5; ctx.lineCap='round'; ctx.lineJoin='round'; return; }
  ctx.globalCompositeOperation='source-over';
  const t=S.tool;
  if(t==='pen'||t==='brush'){ ctx.strokeStyle=toRgba(S.color,S.opacity); ctx.lineWidth=lw*(t==='pen'?0.8:1); ctx.lineCap='round'; ctx.lineJoin='round'; }
  else if(t==='marker'){ ctx.strokeStyle=toRgba(S.color,Math.min(S.opacity*0.55,0.55)); ctx.lineWidth=lw*2.5; ctx.lineCap='square'; ctx.lineJoin='round'; }
  else if(t==='chalk'){ ctx.strokeStyle=toRgba(S.color,S.opacity*0.4); ctx.lineWidth=lw*1.2; ctx.lineCap='round'; ctx.lineJoin='round'; }
  else if(t==='pencil'){ ctx.strokeStyle=toRgba(S.color,S.opacity*0.7); ctx.lineWidth=Math.max(0.8,lw*0.5); ctx.lineCap='round'; ctx.lineJoin='round'; }
}
function sprayDot(x,y){ const r=S.size*1.5,density=Math.floor(r*2); ctx.globalCompositeOperation=S.eraser?'destination-out':'source-over'; ctx.fillStyle=S.eraser?'rgba(0,0,0,0.5)':toRgba(S.color,S.opacity*0.06); for(let i=0;i<density;i++){ const a=Math.random()*Math.PI*2,rad=Math.random()*r; ctx.beginPath(); ctx.arc(x+Math.cos(a)*rad,y+Math.sin(a)*rad,Math.random()*1.5+0.3,0,Math.PI*2); ctx.fill(); } }
function chalkSeg(x1,y1,x2,y2){ const d=Math.hypot(x2-x1,y2-y1),steps=Math.ceil(d/2); ctx.globalCompositeOperation=S.eraser?'destination-out':'source-over'; for(let i=0;i<steps;i++){ const t=i/steps,px=x1+(x2-x1)*t+(Math.random()-0.5)*S.size*0.6,py=y1+(y2-y1)*t+(Math.random()-0.5)*S.size*0.6; ctx.fillStyle=S.eraser?'rgba(0,0,0,'+(0.1+Math.random()*0.25)+')':toRgba(S.color,S.opacity*(0.1+Math.random()*0.2)); ctx.beginPath(); ctx.arc(px,py,Math.random()*S.size*0.4+0.5,0,Math.PI*2); ctx.fill(); } }
function renderStroke(pts){
  if(pts.length<2) return;
  const sp=S.smooth?smooth(pts):pts;
  if(S.tool==='spray'){ sp.forEach((p,i)=>{ if(i%3===0) sprayDot(p.x,p.y); }); return; }
  if(S.tool==='chalk'){ for(let i=1;i<sp.length;i++){ applyStyle(sp[i].pressure||0.5); ctx.beginPath(); ctx.moveTo(sp[i-1].x,sp[i-1].y); ctx.lineTo(sp[i].x,sp[i].y); ctx.stroke(); chalkSeg(sp[i-1].x,sp[i-1].y,sp[i].x,sp[i].y); } ctx.globalCompositeOperation='source-over'; return; }
  if(S.pressure&&!S.eraser&&S.tool!=='marker'){ for(let i=1;i<sp.length;i++){ applyStyle(sp[i].pressure||0.5); ctx.beginPath(); ctx.moveTo(sp[i-1].x,sp[i-1].y); ctx.lineTo(sp[i].x,sp[i].y); ctx.stroke(); } }
  else{ applyStyle(sp[0].pressure||0.5); ctx.beginPath(); ctx.moveTo(sp[0].x,sp[0].y); for(let i=1;i<sp.length;i++) ctx.lineTo(sp[i].x,sp[i].y); ctx.stroke(); }
  ctx.globalCompositeOperation='source-over';
}

// ════════════════════════════════
//  SELECTION TOOL
// ════════════════════════════════
const selBox=document.getElementById('sel-box');
let selHandles=[];

function clearSelection(){
  S.sel=null; S.selImg=null;
  selBox.style.display='none';
  selHandles.forEach(h=>h.remove()); selHandles=[];
  octx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height);
}

function flattenSelection(){
  if(!S.selImg||!S.sel) return;
  // draw floating sel image back onto canvas
  ctx.putImageData(S.selImg,S.sel.x,S.sel.y);
  clearSelection();
}

function renderSelBox(){
  if(!S.sel) return;
  const r=canvas.getBoundingClientRect();
  const {x,y,w,h}=S.sel;
  selBox.style.display='block';
  selBox.style.left=x+'px'; selBox.style.top=y+'px';
  selBox.style.width=w+'px'; selBox.style.height=h+'px';
  // update handles
  selHandles.forEach(h=>h.remove()); selHandles=[];
  const hPositions=[
    {cx:x,cy:y,name:'nw'},{cx:x+w/2,cy:y,name:'n'},{cx:x+w,cy:y,name:'ne'},
    {cx:x+w,cy:y+h/2,name:'e'},{cx:x+w,cy:y+h,name:'se'},
    {cx:x+w/2,cy:y+h,name:'s'},{cx:x,cy:y+h,name:'sw'},{cx:x,cy:y+h/2,name:'w'}
  ];
  hPositions.forEach(hp=>{
    const h=document.createElement('div');
    h.className='sel-handle'; h.dataset.handle=hp.name;
    h.style.left=hp.cx+'px'; h.style.top=hp.cy+'px';
    const cursors={nw:'nw-resize',n:'n-resize',ne:'ne-resize',e:'e-resize',se:'se-resize',s:'s-resize',sw:'sw-resize',w:'w-resize'};
    h.style.cursor=cursors[hp.name];
    container.appendChild(h);
    h.addEventListener('mousedown',onHandleDown);
    selHandles.push(h);
  });
  // draw floating image on overlay
  if(S.selImg){
    octx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height);
    octx.putImageData(S.selImg,x,y);
    // draw dashed outline on overlay
    octx.save(); octx.strokeStyle='rgba(96,165,250,0.8)'; octx.lineWidth=1; octx.setLineDash([4,3]); octx.strokeRect(x+0.5,y+0.5,w-1,h-1); octx.restore();
  }
}

function pickSelection(x,y,w,h){
  // normalize
  if(w<0){x+=w;w=-w;} if(h<0){y+=h;h=-h;}
  w=Math.max(w,4); h=Math.max(h,4);
  x=Math.round(x); y=Math.round(y); w=Math.round(w); h=Math.round(h);
  // clip to canvas
  x=Math.max(0,x); y=Math.max(0,y);
  w=Math.min(w,canvas.width-x); h=Math.min(h,canvas.height-y);
  S.sel={x,y,w,h};
  S.selImg=ctx.getImageData(x,y,w,h);
  // cut from canvas (leave transparent)
  ctx.clearRect(x,y,w,h);
  renderSelBox();
}

function onHandleDown(e){
  e.preventDefault(); e.stopPropagation();
  S.selResizing=true; S.selHandle=e.target.dataset.handle;
  const p=getPos(e);
  S._resizeStart={p,sel:{...S.sel}};
  window.addEventListener('mousemove',onHandleMove);
  window.addEventListener('mouseup',onHandleUp);
}
function onHandleMove(e){
  if(!S.selResizing||!S._resizeStart) return;
  const p=getPos(e);
  const dx=p.x-S._resizeStart.p.x, dy=p.y-S._resizeStart.p.y;
  let {x,y,w,h}=S._resizeStart.sel;
  const hnd=S.selHandle;
  if(hnd.includes('e')) w+=dx;
  if(hnd.includes('s')) h+=dy;
  if(hnd.includes('w')){ x+=dx; w-=dx; }
  if(hnd.includes('n')){ y+=dy; h-=dy; }
  w=Math.max(10,w); h=Math.max(10,h);
  S.sel={x,y,w,h};
  // scale selImg to new size via offscreen canvas
  const tmp=document.createElement('canvas'); tmp.width=w; tmp.height=h;
  const tc=tmp.getContext('2d');
  const src=document.createElement('canvas'); src.width=S._resizeStart.sel.w; src.height=S._resizeStart.sel.h;
  src.getContext('2d').putImageData(S.selImg,0,0);
  tc.drawImage(src,0,0,w,h);
  // update overlay
  octx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height);
  octx.drawImage(tmp,x,y);
  octx.save(); octx.strokeStyle='rgba(96,165,250,0.8)'; octx.lineWidth=1; octx.setLineDash([4,3]); octx.strokeRect(x+0.5,y+0.5,w-1,h-1); octx.restore();
  renderSelBox();
}
function onHandleUp(e){
  if(!S.selResizing) return;
  S.selResizing=false;
  // capture resized image from overlay
  if(S.sel){
    const {x,y,w,h}=S.sel;
    S.selImg=octx.getImageData(x,y,w,h);
  }
  window.removeEventListener('mousemove',onHandleMove);
  window.removeEventListener('mouseup',onHandleUp);
}

// ════════════════════════════════
//  CROP TOOL
// ════════════════════════════════
let cropDragStart=null;
let cropHandleDragging=null;
let cropHandleStart=null;

function startCropMode(){
  S.cropping=true; S.cropRect=null;
  cropCtx.clearRect(0,0,cropCanvas.width,cropCanvas.height);
  cropCanvas.style.display='block'; cropCanvas.style.pointerEvents='all';
  document.getElementById('crop-controls').style.display='flex';
  canvas.style.cursor='crosshair';
  toast('Draw to select crop area');
}

function drawCropOverlay(){
  if(!S.cropRect) return;
  const {x,y,w,h}=S.cropRect;
  cropCtx.clearRect(0,0,cropCanvas.width,cropCanvas.height);
  cropCtx.fillStyle='rgba(0,0,0,0.45)';
  cropCtx.fillRect(0,0,cropCanvas.width,cropCanvas.height);
  cropCtx.clearRect(x,y,w,h);
  cropCtx.strokeStyle='rgba(200,240,74,0.9)'; cropCtx.lineWidth=1.5; cropCtx.setLineDash([]);
  cropCtx.strokeRect(x,y,w,h);
  // rule of thirds
  cropCtx.strokeStyle='rgba(255,255,255,0.2)'; cropCtx.lineWidth=0.5;
  cropCtx.beginPath(); cropCtx.moveTo(x+w/3,y); cropCtx.lineTo(x+w/3,y+h); cropCtx.moveTo(x+w*2/3,y); cropCtx.lineTo(x+w*2/3,y+h); cropCtx.moveTo(x,y+h/3); cropCtx.lineTo(x+w,y+h/3); cropCtx.moveTo(x,y+h*2/3); cropCtx.lineTo(x+w,y+h*2/3); cropCtx.stroke();
  // corner handles
  const hs=8;
  cropCtx.fillStyle='rgba(200,240,74,0.9)';
  [[x,y],[x+w,y],[x+w,y+h],[x,y+h]].forEach(([hx,hy])=>{ cropCtx.fillRect(hx-hs/2,hy-hs/2,hs,hs); });
}

function applyCrop(){
  if(!S.cropRect) { endCrop(false); return; }
  let {x,y,w,h}=S.cropRect;
  if(w<0){x+=w;w=-w;} if(h<0){y+=h;h=-h;}
  x=Math.round(Math.max(0,x)); y=Math.round(Math.max(0,y));
  w=Math.round(Math.min(w,canvas.width-x)); h=Math.round(Math.min(h,canvas.height-y));
  if(w<10||h<10){ toast('Crop area too small'); return; }
  pushUndo();
  const imgData=ctx.getImageData(x,y,w,h);
  canvas.width=w; canvas.height=h;
  bgCanvas.width=w; bgCanvas.height=h;
  overlayCanvas.width=w; overlayCanvas.height=h;
  cropCanvas.width=w; cropCanvas.height=h;
  container.style.width=w+'px'; container.style.height=h+'px';
  bgCtx.fillStyle='#ffffff'; bgCtx.fillRect(0,0,w,h);
  ctx.putImageData(imgData,0,0);
  endCrop(false);
  updateCanvasSizePill();
  toast('Cropped to '+w+'×'+h+'px');
}

function endCrop(cancelled){
  S.cropping=false; S.cropRect=null;
  cropCtx.clearRect(0,0,cropCanvas.width,cropCanvas.height);
  cropCanvas.style.display='none'; cropCanvas.style.pointerEvents='none';
  document.getElementById('crop-controls').style.display='none';
  canvas.style.cursor='crosshair';
  if(cancelled) toast('Crop cancelled');
}

document.getElementById('crop-btn').addEventListener('click',()=>{ clearSelection(); startCropMode(); toast('Select crop region'); });
document.getElementById('apply-crop-btn').addEventListener('click',applyCrop);
document.getElementById('cancel-crop-btn').addEventListener('click',()=>endCrop(true));

cropCanvas.addEventListener('mousedown',e=>{
  if(!S.cropping) return;
  e.preventDefault();
  const p=getPos(e);
  cropDragStart={x:p.x,y:p.y};
  S.cropRect={x:p.x,y:p.y,w:0,h:0};
});
cropCanvas.addEventListener('mousemove',e=>{
  if(!S.cropping||!cropDragStart) return;
  const p=getPos(e);
  S.cropRect={x:cropDragStart.x,y:cropDragStart.y,w:p.x-cropDragStart.x,h:p.y-cropDragStart.y};
  drawCropOverlay();
});
cropCanvas.addEventListener('mouseup',e=>{
  if(!S.cropping) return;
  cropDragStart=null;
  drawCropOverlay();
});

// ── SELECT BTN ──
document.getElementById('select-btn').addEventListener('click',()=>{
  setTool('select'); canvas.style.cursor='default';
  document.getElementById('select-btn').classList.add('active');
  toast('Select: drag to select area, drag selection to move');
});

// ════════════════════════════════
//  STABILIZER RAF
// ════════════════════════════════
let mousePosition={x:0,y:0}, currentPosition={x:0,y:0}, rafId=null;
function stabilizerLoop(){
  if(!S.stabilizer||!S.drawing){ rafId=null; return; }
  rafId=requestAnimationFrame(stabilizerLoop);
  const factor=1-S.smoothness;
  currentPosition.x+=(mousePosition.x-currentPosition.x)*factor;
  currentPosition.y+=(mousePosition.y-currentPosition.y)*factor;
  if(!S.points.length) return;
  const last=S.points[S.points.length-1];
  const moved=Math.hypot(currentPosition.x-last.x,currentPosition.y-last.y);
  if(moved<0.5) return;
  speedHist.push(moved);
  if(speedHist.length>8) speedHist.shift();
  const avg=speedHist.reduce((a,b)=>a+b,0)/speedHist.length;
  const pressure=Math.max(0.1,Math.min(1,1-avg/30));
  S.points.push({x:currentPosition.x,y:currentPosition.y,pressure});
  lastX=currentPosition.x; lastY=currentPosition.y;
  applyImg(liveSnap); renderStroke(S.points);
  const r=canvas.getBoundingClientRect();
  cursorDot.style.left=(r.left+currentPosition.x)+'px';
  cursorDot.style.top=(r.top+currentPosition.y)+'px';
  document.getElementById('sx').textContent=Math.round(currentPosition.x);
  document.getElementById('sy').textContent=Math.round(currentPosition.y);
}

// ════════════════════════════════
//  POINTER EVENTS
// ════════════════════════════════
let lastX=0,lastY=0,speedHist=[];

function onDown(e){
  e.preventDefault();
  const p=getPos(e);

  // SELECT mode
  if(S.tool==='select'){
    // check if inside existing selection → drag
    if(S.sel && p.x>=S.sel.x && p.x<=S.sel.x+S.sel.w && p.y>=S.sel.y && p.y<=S.sel.y+S.sel.h){
      S.selDragging=true;
      S.selDragOff={x:p.x-S.sel.x,y:p.y-S.sel.y};
      return;
    }
    // flatten existing selection first
    flattenSelection();
    // start new selection drag
    S.drawing=true; S.startX=p.x; S.startY=p.y;
    S.sel={x:p.x,y:p.y,w:0,h:0};
    return;
  }

  if(S.tool==='crop') return;

  pushUndo();
  S.drawing=true;
  S.points=[{x:p.x,y:p.y,pressure:0.5}];
  S.startX=p.x; S.startY=p.y;
  lastX=p.x; lastY=p.y; speedHist=[0.5];
  liveSnap=capture();
  mousePosition={x:p.x,y:p.y}; currentPosition={x:p.x,y:p.y};
  if(S.stabilizer&&!rafId) stabilizerLoop();
}

function onMove(e){
  e.preventDefault();
  const p=getPos(e);
  mousePosition={x:p.x,y:p.y};
  const r=canvas.getBoundingClientRect();

  // select drag
  if(S.tool==='select'){
    if(S.selDragging&&S.sel){
      S.sel.x=p.x-S.selDragOff.x; S.sel.y=p.y-S.selDragOff.y;
      renderSelBox(); return;
    }
    if(S.drawing){
      S.sel={x:S.startX,y:S.startY,w:p.x-S.startX,h:p.y-S.startY};
      // draw marching ants on overlay
      octx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height);
      let {x,y,w,h}=S.sel;
      octx.save(); octx.strokeStyle='rgba(96,165,250,0.8)'; octx.lineWidth=1; octx.setLineDash([4,3]); octx.strokeRect(x,y,w,h); octx.restore();
    }
    cursorDot.style.display='block';
    cursorDot.style.left=(r.left+p.x)+'px'; cursorDot.style.top=(r.top+p.y)+'px';
    document.getElementById('sx').textContent=Math.round(p.x);
    document.getElementById('sy').textContent=Math.round(p.y);
    return;
  }

  // stabilizer path
  if(S.stabilizer){
    ghostDot.style.display='block';
    ghostDot.style.left=(r.left+p.x)+'px'; ghostDot.style.top=(r.top+p.y)+'px';
    const gs=S.eraser?S.size*2.5:S.size;
    ghostDot.style.width=gs+'px'; ghostDot.style.height=gs+'px';
    if(!S.drawing){ document.getElementById('sx').textContent=Math.round(p.x); document.getElementById('sy').textContent=Math.round(p.y); }
    if(S.drawing) return;
  } else { ghostDot.style.display='none'; }

  cursorDot.style.display='block';
  cursorDot.style.left=(r.left+p.x)+'px'; cursorDot.style.top=(r.top+p.y)+'px';
  document.getElementById('sx').textContent=Math.round(p.x);
  document.getElementById('sy').textContent=Math.round(p.y);

  if(!S.drawing) return;

  // shape preview on overlay
  if(SHAPE_TOOLS.includes(S.tool)){
    octx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height);
    drawShape(S.startX,S.startY,p.x,p.y,octx);
    return;
  }

  // freehand
  const spd=dist({x:lastX,y:lastY},p);
  speedHist.push(spd); if(speedHist.length>8) speedHist.shift();
  const avg=speedHist.reduce((a,b)=>a+b,0)/speedHist.length;
  const pressure=Math.max(0.1,Math.min(1,1-avg/30));
  S.points.push({x:p.x,y:p.y,pressure});
  lastX=p.x; lastY=p.y;
  applyImg(liveSnap); renderStroke(S.points);
}

function onUp(e){
  const p=getPos(e);

  // select
  if(S.tool==='select'){
    if(S.selDragging){ S.selDragging=false; renderSelBox(); return; }
    if(S.drawing){
      S.drawing=false;
      octx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height);
      let {x,y,w,h}=S.sel;
      if(Math.abs(w)<5||Math.abs(h)<5){ clearSelection(); return; }
      pickSelection(x,y,w,h);
    }
    return;
  }

  if(!S.drawing) return;
  e.preventDefault();
  S.drawing=false;
  if(rafId){ cancelAnimationFrame(rafId); rafId=null; }
  ghostDot.style.display='none';
  octx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height);

  // commit shape
  if(SHAPE_TOOLS.includes(S.tool)){
    drawShape(S.startX,S.startY,p.x,p.y,ctx);
    liveSnap=null; S.points=[];
    refreshBtns(); return;
  }

  // commit freehand stroke
  applyImg(liveSnap); renderStroke(S.points);
  ctx.globalCompositeOperation='source-over';
  liveSnap=null; S.points=[];
  refreshBtns();
}

canvas.addEventListener('mousedown',onDown);
canvas.addEventListener('mousemove',onMove);
canvas.addEventListener('mouseup',onUp);
canvas.addEventListener('mouseleave',()=>{
  if(S.drawing) onUp({preventDefault:()=>{},touches:null});
  cursorDot.style.display='none'; ghostDot.style.display='none';
});
canvas.addEventListener('touchstart',onDown,{passive:false});
canvas.addEventListener('touchmove',onMove,{passive:false});
canvas.addEventListener('touchend',onUp,{passive:false});

// ── KEYBOARD ──
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.key==='e'||e.key==='E'){ setEraser(!S.eraser); toast(S.eraser?'Eraser on':'Eraser off'); }
  if(e.key==='Escape'){ if(S.tool==='select') clearSelection(); if(S.cropping) endCrop(true); }
  if(e.key==='Delete'||e.key==='Backspace'){ if(S.sel){ S.selImg=null; clearSelection(); toast('Selection deleted'); } }
  if((e.ctrlKey||e.metaKey)&&!e.shiftKey&&e.key==='z'){ e.preventDefault(); undo(); }
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='Z'))){ e.preventDefault(); redo(); }
  if((e.ctrlKey||e.metaKey)&&e.key==='a'){ e.preventDefault(); setTool('select'); pickSelection(0,0,canvas.width,canvas.height); toast('All selected'); }
});

// ── TOAST ──
let toastT;
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),2000); }

// ── INIT ──
resizeCanvas(); refreshBtns(); updateCanvasSizePill();
toast('drawboard v3 — resize canvas, shapes, select, crop ✓');
</script>
