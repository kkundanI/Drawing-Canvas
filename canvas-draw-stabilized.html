<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canvas Draw</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e10;
    --panel: #18181b;
    --panel2: #1f1f23;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0f0f0;
    --muted: #888;
    --accent: #c8f04a;
    --red: #f87171;
    --panel-w: 220px;
    --radius: 10px;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }
  #sidebar {
    width: var(--panel-w);
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    overflow-x: hidden;
    flex-shrink: 0;
    z-index: 10;
  }
  #sidebar::-webkit-scrollbar { display: none; }
  .logo {
    padding: 16px 18px 14px;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.5px;
    border-bottom: 1px solid var(--border);
    color: var(--accent);
  }
  .logo span { color: var(--text); opacity: 0.5; font-weight: 400; font-size: 13px; display: block; margin-top: 1px; }
  .section-label {
    padding: 14px 18px 6px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .brush-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    padding: 0 12px 12px;
  }
  .brush-btn {
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 6px 8px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
    color: var(--muted);
    font-size: 10px;
    font-family: 'Syne', sans-serif;
    letter-spacing: 0.5px;
  }
  .brush-btn svg { width: 28px; height: 28px; }
  .brush-btn:hover { border-color: var(--border2); color: var(--text); }
  .brush-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(200,240,74,0.06); }
  .slider-row { padding: 0 18px 12px; display: flex; flex-direction: column; gap: 6px; }
  .slider-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); }
  .slider-label strong { color: var(--text); font-weight: 500; }
  input[type=range] {
    -webkit-appearance: none;
    width: 100%; height: 4px;
    border-radius: 2px;
    background: var(--panel2);
    outline: none;
    border: 1px solid var(--border);
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: none;
  }
  .color-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 5px;
    padding: 0 12px 12px;
  }
  .color-swatch {
    aspect-ratio: 1;
    border-radius: 6px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.1s;
  }
  .color-swatch:hover { transform: scale(1.1); }
  .color-swatch.active { border-color: white; transform: scale(1.1); }
  .custom-color-row { padding: 0 12px 14px; display: flex; align-items: center; gap: 8px; }
  .custom-color-row label { font-size: 11px; color: var(--muted); flex: 1; }
  input[type=color] {
    width: 36px; height: 28px;
    border: 1px solid var(--border2);
    border-radius: 6px;
    background: transparent;
    cursor: pointer;
    padding: 2px;
  }
  .toggle-row { padding: 0 12px 10px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .toggle-label { font-size: 11px; color: var(--muted); }
  .toggle {
    position: relative;
    width: 34px; height: 18px;
    background: var(--panel2);
    border: 1px solid var(--border2);
    border-radius: 9px;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle.on { background: var(--accent); border-color: var(--accent); }
  .toggle::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 12px; height: 12px;
    background: var(--text);
    border-radius: 50%;
    transition: left 0.2s;
  }
  .toggle.on::after { left: 18px; background: var(--bg); }
  .sep { height: 1px; background: var(--border); margin: 4px 0; }
  .action-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    width: calc(100% - 24px);
    margin: 0 12px 6px;
    padding: 9px 12px;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 12px;
    font-family: 'Syne', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
  }
  .action-btn:hover { border-color: var(--border2); background: #27272b; }
  .action-btn.danger:hover { border-color: var(--red); color: var(--red); }
  .action-btn svg { flex-shrink: 0; opacity: 0.7; }
  .action-btn.accent { border-color: var(--accent); color: var(--accent); background: rgba(200,240,74,0.06); }
  .action-btn.accent:hover { background: rgba(200,240,74,0.12); }
  .action-btn:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
  .btn-row { display: flex; gap: 6px; padding: 0 12px 6px; }
  .btn-row .action-btn { width: auto; flex: 1; margin: 0; justify-content: center; padding: 9px 4px; font-size: 11px; }
  #main { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  #topbar {
    height: 44px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 10px;
    flex-shrink: 0;
  }
  .status-pill {
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
  }
  .status-pill span { color: var(--accent); }
  .topbar-right { margin-left: auto; display: flex; gap: 8px; }
  .tool-pill {
    padding: 5px 13px;
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 20px;
    color: var(--muted);
    font-size: 11px;
    font-family: 'Syne', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 5px;
  }
  .tool-pill:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }
  .tool-pill.eraser-on { border-color: var(--red); color: var(--red); background: rgba(248,113,113,0.08); }
  #canvas-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: repeating-conic-gradient(#1a1a1e 0% 25%, #161618 0% 50%) 0 0 / 20px 20px;
    position: relative;
    overflow: hidden;
  }
  #canvas-container {
    position: relative;
    border-radius: 4px;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.1), 0 20px 60px rgba(0,0,0,0.5);
    flex-shrink: 0;
    overflow: hidden;
  }
  /* bg canvas: always white, never touched by eraser */
  #bg-canvas { display: block; }
  /* drawing layer: transparent — eraser destination-out here only reveals white bg */
  #drawing-canvas { display: block; position: absolute; top: 0; left: 0; cursor: crosshair; }
  #snap-indicator {
    position: fixed;
    pointer-events: none;
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    background: rgba(200,240,74,0.15);
    transform: translate(-50%, -50%);
    display: none;
  }
  #cursor-dot {
    position: fixed;
    pointer-events: none;
    border-radius: 50%;
    background: rgba(200,240,74,0.15);
    border: 1.5px solid rgba(200,240,74,0.7);
    transform: translate(-50%, -50%);
    display: none;
    z-index: 9999;
    transition: width 0.1s, height 0.1s;
  }
  #cursor-dot.on-eraser {
    background: rgba(248,113,113,0.15);
    border-color: rgba(248,113,113,0.7);
  }
  /* Ghost cursor: shows raw mouse position when stabilizer is on */
  #ghost-dot {
    position: fixed;
    pointer-events: none;
    border-radius: 50%;
    border: 1px dashed rgba(200,240,74,0.45);
    transform: translate(-50%, -50%);
    display: none;
    z-index: 9998;
    transition: width 0.1s, height 0.1s;
  }
  #toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--panel);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 8px 18px;
    font-size: 12px;
    color: var(--text);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 1000;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="sidebar">
  <div class="logo">drawboard<span>/ canvas</span></div>

  <div class="section-label">Brush Type</div>
  <div class="brush-grid">
    <button class="brush-btn active" data-brush="pen">
      <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M6 22l2-6 12-12 4 4-12 12z"/><path d="M6 22l4-2"/>
      </svg>Pen
    </button>
    <button class="brush-btn" data-brush="marker">
      <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <rect x="10" y="3" width="8" height="14" rx="4"/><path d="M14 17v8"/><path d="M11 22h6"/>
      </svg>Marker
    </button>
    <button class="brush-btn" data-brush="brush">
      <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M6 6l14 14"/><path d="M8 20c0 2 3 3 4 1 1-3-2-6-4-4z"/>
      </svg>Brush
    </button>
    <button class="brush-btn" data-brush="chalk">
      <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <rect x="11" y="4" width="6" height="18" rx="3" transform="rotate(15 14 13)"/>
        <path d="M9 22 Q14 20 18 23" stroke-dasharray="2 2"/>
      </svg>Chalk
    </button>
    <button class="brush-btn" data-brush="spray">
      <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <circle cx="8" cy="20" r="4"/><path d="M12 20h8M20 20v-4M16 12l4 4"/>
        <circle cx="18" cy="10" r="1" fill="currentColor" stroke="none"/>
        <circle cx="22" cy="8" r="1" fill="currentColor" stroke="none"/>
      </svg>Spray
    </button>
    <button class="brush-btn" data-brush="pencil">
      <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M8 20l2-5 9-9 3 3-9 9z"/><path d="M8 20l3-1"/><path d="M19 6l1 1"/>
      </svg>Pencil
    </button>
  </div>

  <div class="section-label">Size</div>
  <div class="slider-row">
    <div class="slider-label"><span>Stroke</span><strong id="size-val">6</strong></div>
    <input type="range" id="size-slider" min="1" max="60" value="6">
  </div>
  <div class="slider-row">
    <div class="slider-label"><span>Opacity</span><strong id="opacity-val">100%</strong></div>
    <input type="range" id="opacity-slider" min="5" max="100" value="100">
  </div>

  <div class="sep"></div>
  <div class="section-label">Color</div>
  <div class="color-grid" id="color-grid"></div>
  <div class="custom-color-row">
    <label>Custom</label>
    <input type="color" id="custom-color" value="#1a1a1a">
  </div>

  <div class="sep"></div>
  <div class="section-label">Options</div>
  <div class="toggle-row">
    <span class="toggle-label">Smooth Lines</span>
    <div class="toggle on" id="smooth-toggle"></div>
  </div>
  <div class="toggle-row">
    <span class="toggle-label">Auto-close Shape</span>
    <div class="toggle on" id="close-toggle"></div>
  </div>
  <div class="toggle-row">
    <span class="toggle-label">Pressure Sim</span>
    <div class="toggle on" id="pressure-toggle"></div>
  </div>
  <div class="toggle-row">
    <span class="toggle-label">Stabilizer</span>
    <div class="toggle" id="stabilizer-toggle"></div>
  </div>
  <div class="slider-row" id="stabilizer-row" style="display:none">
    <div class="slider-label"><span>Smoothness</span><strong id="stabilizer-val">0.85</strong></div>
    <input type="range" id="stabilizer-slider" min="1" max="99" value="85">
  </div>

  <div class="sep"></div>
  <div class="section-label">History</div>
  <div class="btn-row">
    <button class="action-btn" id="undo-btn" title="Ctrl+Z">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M2 7 Q2 2 7 2 Q12 2 12 7 Q12 12 7 12"/><path d="M2 7L4 5M2 7L4 9"/></svg>
      Undo
    </button>
    <button class="action-btn" id="redo-btn" title="Ctrl+Y">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 7 Q12 2 7 2 Q2 2 2 7 Q2 12 7 12"/><path d="M12 7L10 5M12 7L10 9"/></svg>
      Redo
    </button>
  </div>

  <div class="section-label">Erase History</div>
  <div class="btn-row">
    <button class="action-btn" id="restore-btn" title="Restore last erased area">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <path d="M2 7 Q2 2 7 2 Q12 2 12 7 Q12 12 7 12"/><path d="M2 7L4 5M2 7L4 9"/>
        <path d="M6 7h4" stroke-width="1.2"/>
      </svg>
      Restore
    </button>
    <button class="action-btn" id="reerase-btn" title="Re-erase restored area">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <path d="M12 7 Q12 2 7 2 Q2 2 2 7 Q2 12 7 12"/><path d="M12 7L10 5M12 7L10 9"/>
        <path d="M4 7h5" stroke-width="1.2"/>
      </svg>
      Re-erase
    </button>
  </div>

  <div class="sep"></div>
  <div class="section-label">Actions</div>
  <button class="action-btn accent" id="download-btn">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M7 2v8M4 7l3 3 3-3"/><path d="M2 11v1a1 1 0 001 1h8a1 1 0 001-1v-1"/></svg>
    Export PNG
  </button>
  <button class="action-btn danger" id="clear-btn">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M2 4h10M5 4V3h4v1M11 4l-1 9H4L3 4"/></svg>
    Clear Canvas
  </button>
</div>

<div id="main">
  <div id="topbar">
    <div class="status-pill">brush: <span id="status-brush">pen</span></div>
    <div class="status-pill">size: <span id="status-size">6</span>px</div>
    <div class="status-pill">x:<span id="sx">0</span> y:<span id="sy">0</span></div>
    <div class="topbar-right">
      <button class="tool-pill" id="eraser-btn">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M10 3L5 8l-2 4 4-2 5-5z"/><path d="M8 5l2 2"/><path d="M3 12h8"/></svg>
        Eraser  [E]
      </button>
    </div>
  </div>
  <div id="canvas-wrap">
    <div id="canvas-container">
      <canvas id="bg-canvas"></canvas>
      <canvas id="drawing-canvas"></canvas>
    </div>
    <div id="snap-indicator"></div>
    <div id="cursor-dot"></div>
    <div id="ghost-dot"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════
//  TWO-LAYER ARCHITECTURE
//  bg-canvas    — solid white, NEVER drawn on after init
//  drawing-canvas — transparent RGBA layer
//    • draw mode:  source-over  (normal painting)
//    • erase mode: destination-out (removes alpha from drawn pixels only)
//  When exporting: composite bg + drawing → flat PNG
// ══════════════════════════════════════════════════════

const bgCanvas   = document.getElementById('bg-canvas');
const bgCtx      = bgCanvas.getContext('2d');
const canvas     = document.getElementById('drawing-canvas');
const ctx        = canvas.getContext('2d');
const wrap       = document.getElementById('canvas-wrap');
const container  = document.getElementById('canvas-container');

// ── RESIZE ──
function resizeCanvas() {
  const wr = wrap.getBoundingClientRect();
  const pw = wr.width - 48, ph = wr.height - 48;
  const aspect = 4 / 3;
  let w = pw, h = pw / aspect;
  if (h > ph) { h = ph; w = ph * aspect; }
  w = Math.floor(w); h = Math.floor(h);

  const saved = canvas.width > 0 ? ctx.getImageData(0, 0, canvas.width, canvas.height) : null;

  bgCanvas.width = w; bgCanvas.height = h;
  canvas.width   = w; canvas.height   = h;
  container.style.width  = w + 'px';
  container.style.height = h + 'px';

  bgCtx.fillStyle = '#ffffff';
  bgCtx.fillRect(0, 0, w, h);

  if (saved) ctx.putImageData(saved, 0, 0);
}
window.addEventListener('resize', resizeCanvas);

// ── STATE ──
const S = {
  brush: 'pen', size: 6, opacity: 1, color: '#1a1a1a',
  smooth: true, autoClose: true, pressure: true, eraser: false,
  drawing: false, points: [], startX: 0, startY: 0,
  stabilizer: false, smoothness: 0.85,
};

// General history (draw + clear strokes)
let undoStack = [];
let redoStack = [];

// Erase-specific history (only erase strokes)
let eraseUndo = [];  // states before each erase stroke
let eraseRedo = [];  // states after each erase stroke (for re-erase)

// ImageData helpers
const capture  = ()    => ctx.getImageData(0, 0, canvas.width, canvas.height);
const applyImg = (img) => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.putImageData(img,0,0); };

function pushUndo()      { undoStack.push(capture()); if (undoStack.length > 60) undoStack.shift(); redoStack = []; }
function pushEraseUndo() { eraseUndo.push(capture()); if (eraseUndo.length > 40) eraseUndo.shift(); eraseRedo = []; }

function refreshBtns() {
  document.getElementById('undo-btn').disabled    = !undoStack.length;
  document.getElementById('redo-btn').disabled    = !redoStack.length;
  document.getElementById('restore-btn').disabled = !eraseUndo.length;
  document.getElementById('reerase-btn').disabled = !eraseRedo.length;
}

// live snapshot captured at stroke start for real-time preview
let liveSnap = null;

// ── COLORS ──
const PALETTE = [
  '#1a1a1a','#ffffff','#e63946','#f4a261','#e9c46a',
  '#2a9d8f','#457b9d','#6d6875','#f72585','#4cc9f0',
  '#80b918','#ff6b6b','#ffd166','#06d6a0','#118ab2',
  '#a8dadc','#8338ec','#3a86ff','#fb5607','#ffbe0b',
];
const cgrid = document.getElementById('color-grid');
PALETTE.forEach(c => {
  const s = document.createElement('div');
  s.className = 'color-swatch' + (c === '#1a1a1a' ? ' active' : '');
  s.style.background = c;
  if (c === '#ffffff') s.style.border = '2px solid rgba(255,255,255,0.25)';
  s.addEventListener('click', () => {
    document.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('active'));
    s.classList.add('active');
    S.color = c;
    document.getElementById('custom-color').value = c;
    setEraser(false);
  });
  cgrid.appendChild(s);
});
document.getElementById('custom-color').addEventListener('input', e => {
  document.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('active'));
  S.color = e.target.value;
  setEraser(false);
});

// ── BRUSHES ──
document.querySelectorAll('.brush-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.brush-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    S.brush = btn.dataset.brush;
    setEraser(false);
    document.getElementById('status-brush').textContent = S.brush;
    toast('Brush: ' + S.brush);
  });
});

// ── SLIDERS ──
document.getElementById('size-slider').addEventListener('input', function() {
  S.size = +this.value;
  document.getElementById('size-val').textContent    = S.size;
  document.getElementById('status-size').textContent = S.size;
  updateDot();
});
document.getElementById('opacity-slider').addEventListener('input', function() {
  S.opacity = +this.value / 100;
  document.getElementById('opacity-val').textContent = this.value + '%';
});

// ── TOGGLES ──
function makeToggle(id, key) {
  const el = document.getElementById(id);
  el.addEventListener('click', () => {
    S[key] = !S[key];
    el.classList.toggle('on', S[key]);
    toast(key.replace(/([A-Z])/g,' $1').trim() + ': ' + (S[key]?'on':'off'));
  });
}
makeToggle('smooth-toggle',   'smooth');
makeToggle('close-toggle',    'autoClose');
makeToggle('pressure-toggle', 'pressure');

// ── STABILIZER ──
const stabRow = document.getElementById('stabilizer-row');
document.getElementById('stabilizer-toggle').addEventListener('click', function() {
  S.stabilizer = !S.stabilizer;
  this.classList.toggle('on', S.stabilizer);
  stabRow.style.display = S.stabilizer ? 'flex' : 'none';
  if (!S.stabilizer) ghostDot.style.display = 'none';
  toast('Stabilizer: ' + (S.stabilizer ? 'on — smoothness ' + S.smoothness : 'off'));
});
document.getElementById('stabilizer-slider').addEventListener('input', function() {
  S.smoothness = Math.round(this.value) / 100;
  document.getElementById('stabilizer-val').textContent = S.smoothness.toFixed(2);
});

// ── ERASER ──
function setEraser(on) {
  S.eraser = on;
  const btn = document.getElementById('eraser-btn');
  btn.classList.toggle('eraser-on', on);
  document.getElementById('status-brush').textContent = on ? 'eraser' : S.brush;
  updateDot();
}
document.getElementById('eraser-btn').addEventListener('click', () => {
  setEraser(!S.eraser);
  toast(S.eraser ? 'Eraser on — only removes ink' : 'Eraser off');
});
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'e' || e.key === 'E') { setEraser(!S.eraser); toast(S.eraser ? 'Eraser on' : 'Eraser off'); }
  if ((e.ctrlKey||e.metaKey) && !e.shiftKey && e.key==='z') { e.preventDefault(); undo(); }
  if ((e.ctrlKey||e.metaKey) && (e.key==='y' || (e.shiftKey&&e.key==='Z'))) { e.preventDefault(); redo(); }
});

// ── UNDO / REDO ──
function undo() {
  if (!undoStack.length) return;
  redoStack.push(capture());
  applyImg(undoStack.pop());
  refreshBtns();
}
function redo() {
  if (!redoStack.length) return;
  undoStack.push(capture());
  applyImg(redoStack.pop());
  refreshBtns();
}
// Restore erased pixels (step back through erase history)
function restore() {
  if (!eraseUndo.length) return;
  eraseRedo.push(capture());
  applyImg(eraseUndo.pop());
  refreshBtns();
  toast('Erased area restored ↩');
}
// Re-erase (step forward through erase history)
function reerase() {
  if (!eraseRedo.length) return;
  eraseUndo.push(capture());
  applyImg(eraseRedo.pop());
  refreshBtns();
  toast('Re-erased ↪');
}
document.getElementById('undo-btn').addEventListener('click', undo);
document.getElementById('redo-btn').addEventListener('click', redo);
document.getElementById('restore-btn').addEventListener('click', restore);
document.getElementById('reerase-btn').addEventListener('click', reerase);

// ── CLEAR ──
document.getElementById('clear-btn').addEventListener('click', () => {
  pushUndo();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  eraseUndo = []; eraseRedo = [];
  refreshBtns();
  toast('Canvas cleared');
});

// ── EXPORT — composite bg + drawing layer ──
document.getElementById('download-btn').addEventListener('click', () => {
  const out  = document.createElement('canvas');
  out.width  = canvas.width;
  out.height = canvas.height;
  const octx = out.getContext('2d');
  octx.fillStyle = '#ffffff';
  octx.fillRect(0, 0, out.width, out.height);
  octx.drawImage(bgCanvas, 0, 0);
  octx.drawImage(canvas,   0, 0);
  const link = document.createElement('a');
  link.download = 'drawboard-' + Date.now() + '.png';
  link.href = out.toDataURL('image/png');
  link.click();
  toast('Exported PNG ↓');
});

// ── CURSOR DOT ──
const cursorDot = document.getElementById('cursor-dot');
const ghostDot  = document.getElementById('ghost-dot');

// ── STABILIZER STATE ──
// mousePosition  = raw pointer (updated on every mousemove)
// currentPosition = lerp-chased position (updated each rAF frame)
let mousePosition   = { x: 0, y: 0 };
let currentPosition = { x: 0, y: 0 };
let rafId = null;

/**
 * Brush Stabilization — lerp "follow-distance" algorithm.
 *
 * Each animation frame, currentPosition moves only a fraction of the
 * distance toward mousePosition, controlled by `smoothness` (0–1).
 *
 *   currentPosition += (mousePosition - currentPosition) * (1 - smoothness)
 *
 * smoothness = 0  → instant snap (no stabilization)
 * smoothness = 0.95 → very lazy / heavy lag (maximum smoothing)
 *
 * The stabilized currentPosition is what gets pushed into S.points
 * and passed to context.lineTo(), NOT the raw mouse coordinates.
 */
function stabilizerLoop() {
  if (!S.stabilizer || !S.drawing) {
    rafId = null;
    return;
  }
  rafId = requestAnimationFrame(stabilizerLoop);

  // ── LERP: move currentPosition a fraction toward mousePosition ──
  const factor = 1 - S.smoothness;          // low smoothness → big steps
  currentPosition.x += (mousePosition.x - currentPosition.x) * factor;
  currentPosition.y += (mousePosition.y - currentPosition.y) * factor;

  // Only append a new point if the pen has moved meaningfully
  if (S.points.length === 0) return;
  const last = S.points[S.points.length - 1];
  const moved = Math.hypot(currentPosition.x - last.x, currentPosition.y - last.y);
  if (moved < 0.5) return;

  // Simulate pressure from speed (same formula as onMove)
  const spd = moved;
  speedHist.push(spd);
  if (speedHist.length > 8) speedHist.shift();
  const avg = speedHist.reduce((a, b) => a + b, 0) / speedHist.length;
  const pressure = Math.max(0.1, Math.min(1, 1 - avg / 30));

  // Push the stabilized point using context.lineTo() coordinates
  S.points.push({ x: currentPosition.x, y: currentPosition.y, pressure });
  lastX = currentPosition.x;
  lastY = currentPosition.y;

  // Live preview using stabilized path
  applyImg(liveSnap);
  renderStroke(S.points);

  // Move visual cursor dot to the stabilized position
  const r = canvas.getBoundingClientRect();
  cursorDot.style.left = (r.left + currentPosition.x) + 'px';
  cursorDot.style.top  = (r.top  + currentPosition.y) + 'px';
  document.getElementById('sx').textContent = Math.round(currentPosition.x);
  document.getElementById('sy').textContent = Math.round(currentPosition.y);
}
function updateDot() {
  const s = S.eraser ? S.size * 2.5 : S.size;
  cursorDot.style.width  = s + 'px';
  cursorDot.style.height = s + 'px';
  cursorDot.classList.toggle('on-eraser', S.eraser);
}
updateDot();

const snapInd = document.getElementById('snap-indicator');

// ── UTILS ──
function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: src.clientX - r.left, y: src.clientY - r.top };
}
const dist  = (a, b) => Math.hypot(b.x-a.x, b.y-a.y);
const toRgba = (hex, a) => {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
};

// Catmull-Rom spline
function smooth(pts) {
  if (pts.length < 3) return pts;
  const out = [];
  for (let i=0; i<pts.length-1; i++) {
    const p0=pts[Math.max(i-1,0)], p1=pts[i], p2=pts[i+1], p3=pts[Math.min(i+2,pts.length-1)];
    for (let t=0; t<=1; t+=0.2) {
      const t2=t*t, t3=t2*t;
      out.push({
        x: 0.5*((2*p1.x)+(-p0.x+p2.x)*t+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
        y: 0.5*((2*p1.y)+(-p0.y+p2.y)*t+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t2+(-p0.y+3*p1.y-3*p2.y+p3.y)*t3),
        pressure: p1.pressure
      });
    }
  }
  out.push(pts[pts.length-1]);
  return out;
}

// ── BRUSH / ERASER STYLE ──
function applyStyle(pressure) {
  const base = S.size;
  const lw   = S.pressure ? base*(0.4+pressure*0.6) : base;

  if (S.eraser) {
    // KEY: destination-out on transparent drawing-canvas
    // This removes pixels from drawn strokes only — white bg is unaffected
    ctx.globalCompositeOperation = 'destination-out';
    ctx.strokeStyle = 'rgba(0,0,0,1)';
    ctx.lineWidth   = lw * 2.5;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    return;
  }

  ctx.globalCompositeOperation = 'source-over';
  switch (S.brush) {
    case 'pen':
      ctx.strokeStyle = toRgba(S.color, S.opacity);
      ctx.lineWidth = lw * 0.8;
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      break;
    case 'marker':
      ctx.strokeStyle = toRgba(S.color, Math.min(S.opacity*0.55, 0.55));
      ctx.lineWidth = lw * 2.5;
      ctx.lineCap = 'square'; ctx.lineJoin = 'round';
      break;
    case 'brush':
      ctx.strokeStyle = toRgba(S.color, S.opacity*0.8);
      ctx.lineWidth = lw;
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      break;
    case 'chalk':
      ctx.strokeStyle = toRgba(S.color, S.opacity*0.4);
      ctx.lineWidth = lw * 1.2;
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      break;
    case 'spray': break;
    case 'pencil':
      ctx.strokeStyle = toRgba(S.color, S.opacity*0.7);
      ctx.lineWidth = Math.max(0.8, lw*0.5);
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      break;
  }
}

function sprayDot(x, y) {
  const r = S.size * 1.5, density = Math.floor(r * 2);
  ctx.globalCompositeOperation = S.eraser ? 'destination-out' : 'source-over';
  ctx.fillStyle = S.eraser ? 'rgba(0,0,0,0.5)' : toRgba(S.color, S.opacity*0.06);
  for (let i=0; i<density; i++) {
    const a = Math.random()*Math.PI*2, rad = Math.random()*r;
    ctx.beginPath();
    ctx.arc(x+Math.cos(a)*rad, y+Math.sin(a)*rad, Math.random()*1.5+0.3, 0, Math.PI*2);
    ctx.fill();
  }
}

function chalkSeg(x1, y1, x2, y2) {
  const d = Math.hypot(x2-x1, y2-y1), steps = Math.ceil(d/2);
  ctx.globalCompositeOperation = S.eraser ? 'destination-out' : 'source-over';
  for (let i=0; i<steps; i++) {
    const t = i/steps;
    const px = x1+(x2-x1)*t+(Math.random()-0.5)*S.size*0.6;
    const py = y1+(y2-y1)*t+(Math.random()-0.5)*S.size*0.6;
    ctx.fillStyle = S.eraser ? 'rgba(0,0,0,'+(0.1+Math.random()*0.25)+')' : toRgba(S.color, S.opacity*(0.1+Math.random()*0.2));
    ctx.beginPath();
    ctx.arc(px, py, Math.random()*S.size*0.4+0.5, 0, Math.PI*2);
    ctx.fill();
  }
}

function renderStroke(pts) {
  if (pts.length < 2) return;
  const sp = S.smooth ? smooth(pts) : pts;

  if (S.brush === 'spray' || S.eraser && S.brush === 'spray') {
    sp.forEach((p,i) => { if (i%3===0) sprayDot(p.x, p.y); });
    return;
  }
  if (S.brush === 'chalk') {
    for (let i=1; i<sp.length; i++) {
      applyStyle(sp[i].pressure||0.5);
      ctx.beginPath(); ctx.moveTo(sp[i-1].x, sp[i-1].y); ctx.lineTo(sp[i].x, sp[i].y); ctx.stroke();
      chalkSeg(sp[i-1].x, sp[i-1].y, sp[i].x, sp[i].y);
    }
    ctx.globalCompositeOperation = 'source-over';
    return;
  }

  if (S.pressure && !S.eraser && S.brush !== 'marker') {
    for (let i=1; i<sp.length; i++) {
      applyStyle(sp[i].pressure||0.5);
      ctx.beginPath(); ctx.moveTo(sp[i-1].x, sp[i-1].y); ctx.lineTo(sp[i].x, sp[i].y); ctx.stroke();
    }
  } else {
    applyStyle(sp[0].pressure||0.5);
    ctx.beginPath(); ctx.moveTo(sp[0].x, sp[0].y);
    for (let i=1; i<sp.length; i++) ctx.lineTo(sp[i].x, sp[i].y);
    ctx.stroke();
  }
  ctx.globalCompositeOperation = 'source-over';
}

// ── POINTER EVENTS ──
let lastX=0, lastY=0, speedHist=[];

function onDown(e) {
  e.preventDefault();
  const p = getPos(e);
  // Save to the appropriate history before the stroke
  if (S.eraser) {
    pushEraseUndo();
  } else {
    pushUndo();
  }
  S.drawing = true;
  S.points  = [{ x:p.x, y:p.y, pressure:0.5 }];
  S.startX  = p.x; S.startY = p.y;
  lastX=p.x; lastY=p.y;
  speedHist = [0.5];
  liveSnap = capture(); // snapshot of drawing layer right before this stroke

  // Seed stabilizer at the exact click position (no lag on stroke start)
  mousePosition   = { x: p.x, y: p.y };
  currentPosition = { x: p.x, y: p.y };

  // Kick off the rAF loop when stabilizer is enabled
  if (S.stabilizer && !rafId) stabilizerLoop();
}

function onMove(e) {
  e.preventDefault();
  const p = getPos(e);

  // Always update raw mouse position (used by stabilizer loop)
  mousePosition = { x: p.x, y: p.y };

  const r = canvas.getBoundingClientRect();

  if (S.stabilizer) {
    // Ghost dot follows the raw mouse; cursor dot follows the stabilized point (updated in rAF)
    ghostDot.style.display = 'block';
    ghostDot.style.left    = (r.left + p.x) + 'px';
    ghostDot.style.top     = (r.top  + p.y) + 'px';
    const gs = S.eraser ? S.size * 2.5 : S.size;
    ghostDot.style.width  = gs + 'px';
    ghostDot.style.height = gs + 'px';
    // Coordinates shown in topbar are updated by the rAF loop when drawing,
    // otherwise show raw position for non-drawing hover
    if (!S.drawing) {
      document.getElementById('sx').textContent = Math.round(p.x);
      document.getElementById('sy').textContent = Math.round(p.y);
    }
    // rAF loop handles point appending & live preview; nothing more to do here
    if (S.drawing) return;
  } else {
    ghostDot.style.display = 'none';
  }

  // ── Standard (non-stabilized) path ──
  cursorDot.style.display = 'block';
  cursorDot.style.left    = (r.left + p.x) + 'px';
  cursorDot.style.top     = (r.top  + p.y) + 'px';
  document.getElementById('sx').textContent = Math.round(p.x);
  document.getElementById('sy').textContent = Math.round(p.y);

  if (!S.drawing) return;

  const spd = dist({x:lastX,y:lastY}, p);
  speedHist.push(spd);
  if (speedHist.length > 8) speedHist.shift();
  const avg = speedHist.reduce((a,b)=>a+b,0)/speedHist.length;
  const pressure = Math.max(0.1, Math.min(1, 1 - avg/30));

  S.points.push({ x:p.x, y:p.y, pressure });
  lastX=p.x; lastY=p.y;

  // Snap ring (draw mode only)
  if (!S.eraser && S.autoClose && S.points.length > 10) {
    const d = dist({x:p.x,y:p.y},{x:S.startX,y:S.startY});
    const thresh = Math.max(20, S.size*3);
    snapInd.style.display = d < thresh ? 'block' : 'none';
    if (d < thresh) {
      snapInd.style.left = (r.left + S.startX) + 'px';
      snapInd.style.top  = (r.top  + S.startY) + 'px';
    }
  } else {
    snapInd.style.display = 'none';
  }

  // Live preview: restore layer state from stroke start, paint current stroke on top
  applyImg(liveSnap);
  renderStroke(S.points);
}

function onUp(e) {
  if (!S.drawing) return;
  e.preventDefault();
  S.drawing = false;
  snapInd.style.display = 'none';

  // Stop the stabilizer rAF loop
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  ghostDot.style.display = 'none';

  const pts = S.points;

  // Auto-close (draw mode only)
  if (!S.eraser && S.autoClose && pts.length > 10) {
    const d = dist(pts[pts.length-1], {x:S.startX,y:S.startY});
    const mid = dist(pts[0], pts[Math.floor(pts.length/2)]);
    if (d < Math.max(20, S.size*3) && mid > 30) {
      pts.push({ x:S.startX, y:S.startY, pressure:pts[pts.length-1].pressure });
      toast('Shape closed ⬡');
    }
  }

  // Final committed render
  applyImg(liveSnap);
  renderStroke(pts);

  // Faint fill for auto-closed shapes
  if (!S.eraser && S.autoClose && pts.length > 10 && dist(pts[0], pts[pts.length-1]) < 6) {
    ctx.save();
    ctx.globalAlpha = 0.04;
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = S.color;
    const sp2 = S.smooth ? smooth(pts) : pts;
    ctx.beginPath();
    ctx.moveTo(sp2[0].x, sp2[0].y);
    sp2.forEach(p => ctx.lineTo(p.x, p.y));
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  ctx.globalCompositeOperation = 'source-over';
  liveSnap = null;
  S.points = [];
  refreshBtns();
}

canvas.addEventListener('mousedown',  onDown);
canvas.addEventListener('mousemove',  onMove);
canvas.addEventListener('mouseup',    onUp);
canvas.addEventListener('mouseleave', () => {
  if (S.drawing) onUp({preventDefault:()=>{}});
  cursorDot.style.display = 'none';
  ghostDot.style.display  = 'none';
});
canvas.addEventListener('touchstart', onDown, {passive:false});
canvas.addEventListener('touchmove',  onMove, {passive:false});
canvas.addEventListener('touchend',   onUp,   {passive:false});

// ── TOAST ──
let toastT;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), 1900);
}

// ── INIT ──
resizeCanvas();
refreshBtns();
toast('drawboard ready — [E] toggles eraser');
</script>
</body>
</html>
